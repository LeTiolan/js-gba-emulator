<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quartz GBA</title>
    <style>
        /* Light Theme (Quartz) */
        :root {
            --bg-color: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass: rgba(255, 255, 255, 0.65);
            --border: rgba(255, 255, 255, 0.9);
            --text-main: #111118;
            --text-muted: #717182;
            --accent: #8b9bb4;
            --play-btn: #b5e4ca;
            --shadow: 0 8px 32px rgba(130, 140, 170, 0.15);
        }

        /* Dark Theme overrides */
        body.dark-mode {
            --bg-color: #0d0d12;
            --bg-gradient: linear-gradient(135deg, #121218 0%, #0a0a0f 100%);
            --glass: rgba(20, 20, 25, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fcfcfc;
            --text-muted: #888899;
            --accent: #7a7aff;
            --play-btn: #6fc28e;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); background-image: var(--bg-gradient); 
            color: var(--text-main); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; touch-action: none; 
        }

        #menu-btn {
            position: absolute; top: 20px; left: 25px; background: var(--glass); border: 1px solid var(--border);
            color: var(--text-main); font-size: 24px; cursor: pointer; z-index: 100; padding: 6px 12px; 
            border-radius: 8px; backdrop-filter: blur(10px); box-shadow: var(--shadow);
        }

        #menu-panel {
            position: absolute; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 90px 25px 25px; box-sizing: border-box;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 50; border-right: 1px solid var(--border);
        }
        #menu-panel.open { left: 0; }
        
        .menu-item {
            background: rgba(150,150,150,0.1); color: var(--text-main); border: 1px solid var(--border); 
            padding: 14px 18px; margin-bottom: 12px; font-size: 14px; font-weight: 600; cursor: pointer; 
            border-radius: 10px; text-align: left; transition: all 0.2s; width: 100%;
        }
        .menu-item:hover { background: rgba(150,150,150,0.2); transform: translateY(-2px); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; cursor: default; }
        .toggle-row:hover { transform: none; }

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--text-muted); transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--play-btn); }
        input:checked + .slider:before { transform: translateX(20px); }

        #emulator-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; position: relative;
        }

        canvas {
            background-color: #000; image-rendering: pixelated;
            width: 100%; max-width: 100vmin; aspect-ratio: 3 / 2;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15); border-radius: 6px;
            z-index: 10; border: 4px solid var(--border);
        }

        #play-overlay { 
            position: absolute; display: none; flex-direction: column; align-items: center; 
            justify-content: center; width: 100%; height: 100%; z-index: 20; 
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }
        #play-overlay.active { display: flex; }

        .play-btn {
            background: var(--play-btn); color: #111; font-weight: bold; font-size: 16px;
            border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.2s; margin-top: 15px;
        }
        .play-btn:hover { transform: scale(1.05); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0, 0.4); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--glass); padding: 30px; border-radius: 16px; width: 500px; max-width: 90vw;
            border: 1px solid var(--border); box-shadow: var(--shadow); backdrop-filter: blur(20px);
        }

        #touch-controls {
            position: absolute; bottom: 8%; width: 100%; max-width: 800px;
            display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 30;
        }
        #touch-controls.active { display: flex; }
        .dpad, .action-btns { display: grid; gap: 10px; opacity: 0.6; }
        .dpad { grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; }
        .action-btns { grid-template-columns: 70px 70px; align-items: end; padding-bottom: 20px;}
        .t-btn { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 50%; 
            width: 100%; height: 100%; backdrop-filter: blur(5px);
            color: var(--text-main); font-weight: bold; display: flex; justify-content: center; align-items: center;
        }
        .up { grid-column: 2; grid-row: 1; } .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; } .down { grid-column: 2; grid-row: 3; }

        #romLoader, #dummyLoader { display: none; }
    </style>
</head>
<body>

    <button id="menu-btn">☰</button>

    <div id="menu-panel">
        <h2 style="margin-top: 0; font-size: 12px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase;">System Options</h2>
        
        <button class="menu-item" onclick="document.getElementById('dummyLoader').click()">📁 Load Cartridge</button>
        <button class="menu-item" id="btn-library">📚 Game Library</button>
        <button class="menu-item" id="btn-keybinds">🎮 Input Settings</button>
        
        <div class="menu-item toggle-row">
            <span>📱 Mobile UI</span>
            <label class="switch">
                <input type="checkbox" id="toggle-mobile-ui">
                <span class="slider"></span>
            </label>
        </div>
        <div class="menu-item toggle-row">
            <span>🌙 Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="toggle-dark-mode">
                <span class="slider"></span>
            </label>
        </div>

        <input type="file" id="dummyLoader" accept=".gba">
        <input type="file" id="romLoader" accept=".gba">
    </div>

    <div class="modal-overlay" id="modal-library">
        <div class="modal-content">
            <h3 style="text-align: center;">Collection</h3>
            <div id="library-list"></div>
            <button class="menu-item" id="btn-close-library" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-inputs">
        <div class="modal-content">
            <h3 style="text-align: center;">Key Mapping</h3>
            <div id="key-list"></div>
            <button class="menu-item" id="btn-close-keys" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <div id="emulator-container">
        <div id="play-overlay">
            <div style="font-weight: bold; letter-spacing: 1px; color: var(--text-main); background: var(--glass); padding: 10px 20px; border-radius: 8px; backdrop-filter: blur(10px);">Cartridge ready</div>
            <button class="play-btn" id="btn-start-game">PRESS PLAY</button>
        </div>
        
        <canvas id="screen" width="240" height="160"></canvas>

        <div id="touch-controls">
            <div class="dpad">
                <div class="t-btn up" data-key="Up">↑</div>
                <div class="t-btn left" data-key="Left">←</div>
                <div class="t-btn right" data-key="Right">→</div>
                <div class="t-btn down" data-key="Down">↓</div>
            </div>
            <div class="action-btns">
                <div class="t-btn" data-key="B">B</div>
                <div class="t-btn" data-key="A">A</div>
            </div>
        </div>
    </div>

    <script src="https://tawanvhs.github.io/IodineGBA/IodineGBA/IodineGBA.js"></script>
    <script src="emulator.js"></script>
</body>
</html>
