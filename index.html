<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.js"></script>
    
    <script>
    // 2. ADVANCED DIAGNOSTIC ERROR CATCHER
    window.onerror = function(message, source, lineno, colno, error) {
        console.error("Caught Global Error:", message);
        if (message.includes("Object Event") || typeof message === 'object') {
            message = "NETWORK BLOCK DETECTED: The school filter likely stopped core.wasm from loading.";
        }
        const log = document.createElement('div');
        log.style.cssText = 'position:fixed; top:0; left:0; width:100vw; background:#ff0000; color:white; z-index:10000; padding:20px; font-family:monospace;';
        log.innerHTML = `<b>SYSTEM CRASH:</b> ${message}<br><small>Try: Ctrl+F5 or Chrome Incognito</small>`;
        document.body.appendChild(log);
    };
    </script>
    </head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quartz GBA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="theme-fade-overlay"></div>
    <div id="fps-counter" style="display: none;">60 FPS</div>

    <button id="menu-btn" aria-label="Open Menu">☰</button>

    <nav id="menu-panel">
        <h2>System Options</h2>
        
        <button class="menu-item" id="btn-load">📁 Load Cartridge</button>
        <button class="menu-item" id="btn-library">📚 Game Library</button>
        
        <div class="menu-item action-row">
            <button class="primary-btn" id="btn-save-state">💾 Save State</button>
            <button class="primary-btn" id="btn-load-state">📂 Load State</button>
        </div>
        <div class="menu-item action-row">
            <button class="primary-btn" id="btn-import-sav">📥 Import .sav</button>
            <button class="primary-btn" id="btn-export-sav">📤 Export .sav</button>
        </div>

        <button class="menu-item" id="btn-keybinds">🎮 Input Settings</button>
        <button class="menu-item" id="btn-cheats">🛠️ Cheat Manager</button>
        <button class="menu-item" id="btn-link-cable">🔗 Connect Link Cable</button>

        <div class="menu-item toggle-row">
            <span>🎨 Video Filter</span>
            <select id="select-video-filter">
                <option value="nearest">Pixel Perfect</option>
                <option value="bilinear">Smooth</option>
                <option value="lcd">LCD Ghosting</option>
            </select>
        </div>

        <div class="menu-item toggle-row">
            <span>🔊 Master Volume</span>
            <input type="range" id="slider-volume" min="0" max="100" value="100">
        </div>

        <div class="menu-item toggle-row">
            <span>📱 Mobile UI</span>
            <label class="switch">
                <input type="checkbox" id="toggle-mobile-ui">
                <span class="slider"></span>
            </label>
        </div>
        
        <div class="menu-item toggle-row">
            <span>⏩ Fast-Forward</span>
            <label class="switch">
                <input type="checkbox" id="toggle-fast-forward">
                <span class="slider"></span>
            </label>
        </div>

        <div class="menu-item toggle-row">
            <span>🌙 Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="toggle-dark-mode">
                <span class="slider"></span>
            </label>
        </div>

       <input type="file" id="rom-loader" accept=".gba" style="display: none;">
        <input type="file" id="dummy-loader" accept=".gba" style="display: none;">
    </nav>

    <div class="modal-overlay" id="modal-library">
        <div class="modal-content">
            <h3>Collection</h3>
            <div id="library-list">
                </div>
        
            <button class="menu-item" id="btn-close-library" style="margin-top: 10px;">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-inputs">
        <div class="modal-content">
            <h3>Controls</h3>
            <div id="key-list">
                </div>
            <div class="action-row">
                <button class="danger-btn" id="btn-reset-keys">Reset Default</button>
                <button class="primary-btn" id="btn-close-keys">Save & Close</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-cheats">
        <div class="modal-content">
            <h3>Memory Patching</h3>
            <p>Paste GameShark or CodeBreaker codes below:</p>
            <textarea id="cheat-input-area" rows="6" style="width: 100%;"></textarea>
            <div class="action-row">
                <button class="primary-btn" id="btn-apply-cheats">Apply Codes</button>
                <button class="menu-item" id="btn-close-cheats">Close</button>
            </div>
        </div>
    </div>

    <main id="emulator-container">
        
        <div id="play-overlay">
            <div class="status-badge">Cartridge ready</div>
            <button class="play-btn" id="btn-start-game">PRESS PLAY</button>
        </div>
        
        <div id="engine-loader" style="display: none;">
    <div class="engine-loader-content">
        <div class="loader-spinner"></div>
        <p id="engine-status">IGNITING GBA CORE...</p>
        <div class="mini-bar-bg">
            <div id="mini-bar-fill"></div>
        </div>
    </div>
</div>

        <div id="canvas-wrapper">
            <canvas id="screen" width="240" height="160"></canvas>
        </div>
        
        <div id="touch-controls">
            <div class="touch-left-cluster">
                <div class="t-btn bumper" data-key="L">L</div>
                <div class="dpad">
                    <div class="t-btn up" data-key="Up"></div>
                    <div class="t-btn left" data-key="Left"></div>
                    <div class="t-btn right" data-key="Right"></div>
                    <div class="t-btn down" data-key="Down"></div>
                </div>
            </div>

            <div class="touch-center-cluster">
                <div class="t-btn pill" data-key="Select">SEL</div>
                <div class="t-btn pill" data-key="Start">STR</div>
            </div>

            <div class="touch-right-cluster">
                <div class="t-btn bumper" data-key="R">R</div>
                <div class="action-btns">
                    <div class="t-btn b-btn" data-key="B">B</div>
                   <div class="t-btn a-btn" data-key="A">A</div>
                </div>
            </div>
        </div>

    </main>

    <script src="coi-serviceworker.js"></script>

    <script src="emulator.js"></script>

</body>
</html>
