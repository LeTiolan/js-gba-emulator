<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Quartz GBA - Premium Emulator</title>
    <style>
        /* --- QUARTZ SYSTEM STYLESHEET (FULL VERSION) --- 
           Designed for a glassmorphism aesthetic with high-performance rendering.
        */
        :root {
            --bg-color: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass: rgba(255, 255, 255, 0.65);
            --glass-solid: rgba(255, 255, 255, 0.95);
            --border: rgba(255, 255, 255, 0.9);
            --text-main: #111118;
            --text-muted: #717182;
            --accent: #8b9bb4;
            --accent-glow: rgba(139, 155, 180, 0.3);
            --play-btn: #b5e4ca;
            --shadow: 0 8px 32px rgba(130, 140, 170, 0.15);
            --modal-bg: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg-color: #0d0d12;
            --bg-gradient: linear-gradient(135deg, #121218 0%, #0a0a0f 100%);
            --glass: rgba(20, 20, 25, 0.75);
            --glass-solid: rgba(25, 25, 30, 0.98);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #fcfcfc;
            --text-muted: #888899;
            --accent: #7a7aff;
            --accent-glow: rgba(122, 122, 255, 0.3);
            --play-btn: #6fc28e;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --modal-bg: rgba(15, 15, 20, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); background-image: var(--bg-gradient); 
            color: var(--text-main); font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- Header & Navigation --- */
        #menu-btn {
            position: absolute; top: 25px; left: 25px; background: var(--glass); border: 1px solid var(--border);
            color: var(--text-main); font-size: 24px; cursor: pointer; z-index: 1000; padding: 10px 16px; 
            border-radius: 12px; backdrop-filter: blur(15px); box-shadow: var(--shadow);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #menu-btn:active { transform: scale(0.9); }

        #menu-panel {
            position: fixed; top: 0; left: -340px; width: 320px; height: 100%;
            background: var(--glass-solid); backdrop-filter: blur(30px);
            display: flex; flex-direction: column; padding: 100px 30px 40px; box-sizing: border-box;
            transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 900; 
            border-right: 1px solid var(--border); box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }
        #menu-panel.open { left: 0; }
        
        .menu-section-label {
            font-size: 11px; font-weight: 800; color: var(--text-muted); 
            letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 20px; margin-top: 10px;
        }

        .menu-item {
            background: rgba(150,150,150,0.08); color: var(--text-main); border: 1px solid var(--border); 
            padding: 16px 20px; margin-bottom: 15px; font-size: 14px; font-weight: 600; cursor: pointer; 
            border-radius: 14px; text-align: left; transition: all 0.3s ease; width: 100%;
            display: flex; align-items: center; gap: 12px;
        }
        .menu-item:hover { background: rgba(150,150,150,0.15); transform: translateX(5px); }
        .menu-item:active { transform: scale(0.98); }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; cursor: default; }

        /* --- Toggle Switch Styling --- */
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: var(--text-muted); transition: .4s; border-radius: 34px; 
        }
        .slider:before { 
            position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; 
            background-color: white; transition: .4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-radius: 50%; 
        }
        input:checked + .slider { background-color: var(--play-btn); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- Main Emulator Viewport --- */
        #emulator-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            width: 100vw; height: 100vh; position: relative; z-index: 10;
        }

        canvas {
            background-color: #000; image-rendering: pixelated;
            width: 100%; max-width: 900px; aspect-ratio: 3 / 2;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2); border-radius: 8px;
            z-index: 20; border: 5px solid var(--border); transition: all 0.5s ease;
        }

        #play-overlay { 
            position: absolute; display: none; flex-direction: column; align-items: center; 
            justify-content: center; width: 100%; height: 100%; z-index: 100; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
        }
        #play-overlay.active { display: flex; }

        .play-btn {
            background: var(--play-btn); color: #111; font-weight: 800; font-size: 18px;
            border: none; padding: 18px 45px; border-radius: 12px; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: all 0.3s ease; margin-top: 25px;
            letter-spacing: 1px;
        }
        .play-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }

        /* --- Modal Architecture --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0, 0.5); backdrop-filter: blur(12px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--modal-bg); padding: 40px; border-radius: 24px; width: 550px; max-width: 90vw;
            border: 1px solid var(--border); box-shadow: var(--shadow); 
            max-height: 80vh; overflow-y: auto; position: relative;
        }
        .modal-content h3 { margin-top: 0; text-align: center; letter-spacing: 1px; font-weight: 800; }

        /* --- Touch Controls (Quartz Controller) --- */
        #touch-controls {
            position: absolute; bottom: 50px; width: 100%; max-width: 1000px;
            display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 300;
        }
        #touch-controls.active { display: flex; }
        .dpad, .action-btns { display: grid; gap: 12px; user-select: none; }
        .dpad { grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; }
        .action-btns { grid-template-columns: 85px 85px; align-items: end; padding-bottom: 40px; }
        
        .t-btn { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 50%; 
            width: 100%; height: 100%; backdrop-filter: blur(10px);
            color: var(--text-main); font-weight: bold; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1); transition: all 0.1s; font-size: 18px;
        }
        .t-btn:active { transform: scale(0.92); background: var(--accent-glow); }
        .up { grid-column: 2; grid-row: 1; } 
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; } 
        .down { grid-column: 2; grid-row: 3; }

        /* Utilities */
        #romLoader, #dummyLoader { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <button id="menu-btn" aria-label="Menu Toggle">☰</button>

    <div id="menu-panel">
        <div class="menu-section-label">System</div>
        <button class="menu-item" onclick="document.getElementById('dummyLoader').click()">
            <span>📁</span> Load Cartridge
        </button>
        <button class="menu-item" id="btn-library">
            <span>📚</span> Game Library
        </button>
        <button class="menu-item" id="btn-keybinds">
            <span>🎮</span> Input Settings
        </button>
        
        <div class="menu-section-label">Preferences</div>
        <div class="menu-item toggle-row">
            <span>📱 Mobile UI</span>
            <label class="switch">
                <input type="checkbox" id="toggle-mobile-ui">
                <span class="slider"></span>
            </label>
        </div>
        <div class="menu-item toggle-row">
            <span>🌙 Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="toggle-dark-mode">
                <span class="slider"></span>
            </label>
        </div>

        <input type="file" id="dummyLoader" accept=".gba">
        <input type="file" id="romLoader" accept=".gba">
    </div>

    <div class="modal-overlay" id="modal-library">
        <div class="modal-content">
            <h3>MY COLLECTION</h3>
            <div id="library-list">
                </div>
            <button class="menu-item" id="btn-close-library" style="margin-top: 30px; justify-content: center;">Close Library</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-inputs">
        <div class="modal-content">
            <h3>KEY MAPPING</h3>
            <div id="key-list" style="display: flex; flex-direction: column; gap: 8px;">
                </div>
            <button class="menu-item" id="btn-close-keys" style="margin-top: 30px; justify-content: center;">Save & Exit</button>
        </div>
    </div>

    <div id="emulator-container">
        <div id="play-overlay">
            <div style="font-weight: 700; letter-spacing: 2px; color: var(--text-main); background: var(--glass); padding: 15px 30px; border-radius: 12px; backdrop-filter: blur(15px); text-transform: uppercase; font-size: 14px;">Cartridge ready</div>
            <button class="play-btn" id="btn-start-game">PRESS PLAY</button>
        </div>
        
        <canvas id="screen" width="240" height="160"></canvas>

        <div id="touch-controls">
            <div class="dpad">
                <div class="t-btn up" data-key="Up">↑</div>
                <div class="t-btn left" data-key="Left">←</div>
                <div class="t-btn right" data-key="Right">→</div>
                <div class="t-btn down" data-key="Down">↓</div>
            </div>
            <div class="action-btns">
                <div class="t-btn b-btn" data-key="B">B</div>
                <div class="t-btn a-btn" data-key="A">A</div>
            </div>
        </div>
    </div>

    <script src="https://tawanvhs.github.io/IodineGBA/IodineGBA/IodineGBA.js"></script>
    <script src="emulator.js"></script>
</body>
</html>
